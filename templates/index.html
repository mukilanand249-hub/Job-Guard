{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-4">Job Fraud Detection Scanner</h1>
        <p class="text-gray-400">Analyze job postings for potential fraud using AI and Heuristics.</p>
    </div>

    <div class="bg-gray-800 rounded-lg p-6 shadow-lg mb-8">
        <div class="flex space-x-4 mb-6 border-b border-gray-700 pb-4">
            <button id="btn-text" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 transition">Paste Text</button>
            <button id="btn-url" class="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600 transition">Paste URL</button>
            <button id="btn-image" class="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600 transition">Upload
                Image</button>
        </div>

        <div id="input-text-container">
            <textarea id="job-text"
                class="w-full h-40 bg-gray-900 border border-gray-700 rounded p-4 text-white focus:outline-none focus:border-blue-500"
                placeholder="Paste the job description here..."></textarea>
        </div>
        <div id="input-url-container" class="hidden">
            <input type="url" id="job-url"
                class="w-full bg-gray-900 border border-gray-700 rounded p-4 text-white focus:outline-none focus:border-blue-500"
                placeholder="https://example.com/job-posting">
        </div>
        <div id="input-image-container" class="hidden">
            <div class="border-2 border-dashed border-gray-600 rounded-lg p-8 text-center">
                <input type="file" id="job-image" accept="image/*" class="hidden">
                <label for="job-image" class="cursor-pointer text-blue-400 hover:text-blue-300">
                    Click to upload screenshot or offer letter
                </label>
                <p id="file-name" class="mt-2 text-gray-500 text-sm"></p>
            </div>
        </div>

        <div class="flex space-x-4 mt-6">
            <button id="scan-btn"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition">
                Analyze Now
            </button>
            <button id="report-btn"
                class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded transition hidden">
                Report as Scam
            </button>
        </div>
    </div>

    <div id="result-card" class="hidden bg-gray-800 rounded-lg p-6 shadow-lg animate-fade-in">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-2xl font-bold mb-1">Analysis Report</h2>
                <p class="text-gray-400 text-sm">Generated by JobGuard AI</p>
            </div>
            <div class="text-right">
                <div id="verdict-badge" class="px-4 py-1 rounded-full font-bold text-sm uppercase inline-block mb-2">
                </div>
                <div id="recommendation-badge" class="block text-lg font-bold"></div>
            </div>
        </div>

        <div class="bg-gray-700 p-4 rounded-lg mb-6 border-l-4 border-blue-500">
            <h3 class="font-bold text-blue-400 mb-1">AI Analysis Summary</h3>
            <p id="analysis-summary" class="text-gray-200"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-gray-900 p-4 rounded text-center">
                <p class="text-gray-400 text-sm mb-2">Trust Score</p>
                <div class="relative w-32 h-32 mx-auto">
                    <canvas id="score-gauge"></canvas>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span id="score-value" class="text-2xl font-bold"></span>
                    </div>
                </div>
            </div>
            <div class="col-span-2 grid grid-cols-2 gap-4">
                <div class="bg-gray-900 p-4 rounded">
                    <h3 class="text-red-400 font-bold mb-2">Red Flags</h3>
                    <ul id="red-flags-list" class="list-disc list-inside text-sm text-gray-300 space-y-1"></ul>
                </div>
                <div class="bg-gray-900 p-4 rounded">
                    <h3 class="text-green-400 font-bold mb-2">Green Flags</h3>
                    <ul id="green-flags-list" class="list-disc list-inside text-sm text-gray-300 space-y-1"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const btnText = document.getElementById('btn-text');
    const btnUrl = document.getElementById('btn-url');
    const btnImage = document.getElementById('btn-image');
    const inputTextContainer = document.getElementById('input-text-container');
    const inputUrlContainer = document.getElementById('input-url-container');
    const inputImageContainer = document.getElementById('input-image-container');
    const scanBtn = document.getElementById('scan-btn');
    const reportBtn = document.getElementById('report-btn');
    const resultCard = document.getElementById('result-card');
    const jobImageInput = document.getElementById('job-image');
    const fileNameDisplay = document.getElementById('file-name');

    let mode = 'text';

    btnText.addEventListener('click', () => setMode('text'));
    btnUrl.addEventListener('click', () => setMode('url'));
    btnImage.addEventListener('click', () => setMode('image'));

    function setMode(newMode) {
        mode = newMode;
        // Reset buttons
        [btnText, btnUrl, btnImage].forEach(btn => {
            btn.classList.remove('bg-blue-600');
            btn.classList.add('bg-gray-700');
        });
        // Reset containers
        [inputTextContainer, inputUrlContainer, inputImageContainer].forEach(div => div.classList.add('hidden'));

        // Activate selected
        if (mode === 'text') {
            btnText.classList.add('bg-blue-600');
            btnText.classList.remove('bg-gray-700');
            inputTextContainer.classList.remove('hidden');
        } else if (mode === 'url') {
            btnUrl.classList.add('bg-blue-600');
            btnUrl.classList.remove('bg-gray-700');
            inputUrlContainer.classList.remove('hidden');
        } else {
            btnImage.classList.add('bg-blue-600');
            btnImage.classList.remove('bg-gray-700');
            inputImageContainer.classList.remove('hidden');
        }
    }

    jobImageInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileNameDisplay.innerText = e.target.files[0].name;
        }
    });

    scanBtn.addEventListener('click', async () => {
        const text = document.getElementById('job-text').value;
        const url = document.getElementById('job-url').value;
        const imageFile = jobImageInput.files[0];

        if (mode === 'text' && !text) return alert('Please enter text');
        if (mode === 'url' && !url) return alert('Please enter URL');
        if (mode === 'image' && !imageFile) return alert('Please upload an image');

        scanBtn.disabled = true;
        scanBtn.innerText = 'Analyzing...';
        resultCard.classList.add('hidden');
        reportBtn.classList.add('hidden');

        try {
            let response;
            if (mode === 'image') {
                const formData = new FormData();
                formData.append('image', imageFile);
                response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
            } else {
                response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: mode === 'text' ? text : null, url: mode === 'url' ? url : null })
                });
            }

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            renderResult(data);

            if (mode === 'url' && data.verdict === 'SCAM') {
                reportBtn.classList.remove('hidden');
                reportBtn.onclick = () => reportScam(url);
            }

        } catch (e) {
            alert('Error: ' + e.message);
        } finally {
            scanBtn.disabled = false;
            scanBtn.innerText = 'Analyze Now';
        }
    });

    async function reportScam(url) {
        if (!confirm('Are you sure you want to report this URL as a scam to the community?')) return;

        try {
            const response = await fetch('/report_scam', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url, reason: 'Reported by user after AI scan' })
            });
            const data = await response.json();
            alert(data.message || data.error);
        } catch (e) {
            alert('Failed to report');
        }
    }

    let gaugeChart = null;

    function renderResult(data) {
        resultCard.classList.remove('hidden');

        const verdictBadge = document.getElementById('verdict-badge');
        verdictBadge.innerText = data.verdict;
        verdictBadge.className = `px-4 py-1 rounded-full font-bold text-sm uppercase ${data.verdict === 'LEGIT' ? 'bg-green-900 text-green-300' :
                data.verdict === 'SCAM' ? 'bg-red-900 text-red-300' : 'bg-yellow-900 text-yellow-300'
            }`;

        const recBadge = document.getElementById('recommendation-badge');
        recBadge.innerText = data.recommendation;
        recBadge.className = `block text-lg font-bold ${data.recommendation === 'Safe to Apply' ? 'text-green-400' :
                data.recommendation === 'Do Not Apply' ? 'text-red-400' : 'text-yellow-400'
            }`;

        document.getElementById('analysis-summary').innerText = data.analysis_summary;

        document.getElementById('score-value').innerText = data.trust_score;

        const redList = document.getElementById('red-flags-list');
        redList.innerHTML = data.red_flags.length ? data.red_flags.map(f => `<li>${f}</li>`).join('') : '<li>None detected</li>';

        const greenList = document.getElementById('green-flags-list');
        greenList.innerHTML = data.green_flags.length ? data.green_flags.map(f => `<li>${f}</li>`).join('') : '<li>None detected</li>';

        const ctx = document.getElementById('score-gauge').getContext('2d');
        if (gaugeChart) gaugeChart.destroy();

        gaugeChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [data.trust_score, 100 - data.trust_score],
                    backgroundColor: [
                        data.trust_score > 70 ? '#10B981' : data.trust_score < 40 ? '#EF4444' : '#F59E0B',
                        '#374151'
                    ],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', responsive: true, maintainAspectRatio: false }
        });
    }
</script>
{% endblock %}
